 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container-fluid">
    <div class="verify-card ">
        <div class="text-center mb-4">
            <h2 class="text-success">
                <span> VerifyMe</span>         
              </h2>
            <p class="text-center">
                Open your account — it takes about 3 minutes
            </p>
        </div>
        <div class="mb-4">
            <div class="d-flex justify-content-between small fw-semibold mb-2">
                <span class="text-success">1 · IDENTITY</span>
                <span class="text-success">2 · ADDRESS & INCOME</span>
                <span class="text-success">3 · DOCUMENTS</span>
            </div>
            <div class="progress" style="height:5px;">
                <div class="progress-bar bg-success" style="width:33%"></div>
            </div><br> 
    <form>
            <div class="mb-3">
                <input
                    type="text"
                    class="form-control form-control-lg"
                    placeholder="Full  name">
            </div>
            <div class="mb-3">
                <input
                    type="email"
                    class="form-control form-control-lg"
                    placeholder="Email address">
            </div>
            <label class="form-label">Mobile Number</label>
            <div class="input-group mb-3">
                <span class="input-group-text">+91</span>
                <input
                    type="text"
                    class="form-control"
                    placeholder="10-digit mobile">
            </div>
            <label class="form-label">PAN</label>
            <div class="input-group mb-4">
                <span class="input-group-text">🪪</span>
                <input
                    type="text"
                    class="form-control"
                    placeholder="ABCDE1234F">
            </div>
            <div class="d-flex justify-content-between">
                <button class="btn btn-outline-secondary">
                    Back
                </button>
                <button class="btn btn-success px-4">
                    Continue
                </button>
            </div>
        </form>
    </div>
 <p class="text-center mt-4 text-muted">
        🔒 Bank-grade encryption · your data is never sold
    </p>

</div>
</body>
</html>
